name: smart_attendance
description: A smart attendance system with GPS and Wi-Fi constraints.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  go_router: ^12.0.0
  geolocator: ^10.1.0
  wifi_info_flutter: ^2.0.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.0.0
  file_picker: ^8.0.0
  excel: ^2.1.0
  dio: ^5.3.0
  shared_preferences: ^2.2.0
  logger: ^2.0.2+1
  flutter_svg: ^2.0.9
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true